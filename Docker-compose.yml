version: '3.8'

services:
  dead-ones-therapist:
    build: .
    container_name: dead-ones-therapist
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - SDL_VIDEODRIVER=x11
      - SDL_AUDIODRIVER=alsa
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./assets:/app/assets:ro
    stdin_open: true
    tty: true
    # For audio support (Linux only)
    devices:
      - /dev/snd:/dev/snd