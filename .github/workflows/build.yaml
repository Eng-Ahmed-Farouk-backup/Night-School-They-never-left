name: Build Night School EXE
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "NightSchool_TheyNeverLeft" --icon=NONE --add-data "assets;assets" --add-data "BRADHITC.TTF;." gui.py
    - name: Create game folder with assets
      run: |
        mkdir "NightSchool_TheyNeverLeft"
        copy dist\NightSchool_TheyNeverLeft.exe "NightSchool_TheyNeverLeft\"
        xcopy assets "NightSchool_TheyNeverLeft\assets\" /E /I
        copy BRADHITC.TTF "NightSchool_TheyNeverLeft\"
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path "NightSchool_TheyNeverLeft" -DestinationPath "NightSchool_TheyNeverLeft-Windows.zip"
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: NightSchool_TheyNeverLeft-Windows.zip
        name: "Night School: They Never Left - v${{ github.ref_name }}"
        body: |
          # Night School: They Never Left
          
          ## A Visual Novel by [Your Name]
          
          ### Story:
          Max Ran is a typical high school student... until two angels, Alaska and Anabelle, fall from heaven to give him a mission. His task? Become a therapist for the dead.
          
          ### Download & Play:
          1. Download `NightSchool_TheyNeverLeft-Windows.zip`
          2. Extract the ZIP file anywhere
          3. Run `NightSchool_TheyNeverLeft.exe`
          
          ### System Requirements:
          - Windows 10 or later
          - No installation required - runs directly!
          
          ### Controls:
          - Click "Continue" to advance dialogue
          - Click choices when they appear
          - Close window to exit
          
          ### Note:
          If Windows SmartScreen appears, click "More info" → "Run anyway"
          
          ---
          *"When two angels fall from heaven, the dead finally find peace."*
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-2.0-0 libsdl2-mixer-2.0-0 libsdl2-image-2.0-0 libsdl2-ttf-2.0-0
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller pygame
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "NightSchool_TheyNeverLeft" --add-data "assets:assets" --add-data "BRADHITC.TTF:." gui.py
    - name: Create game folder
      run: |
        mkdir -p NightSchool_TheyNeverLeft
        cp dist/NightSchool_TheyNeverLeft NightSchool_TheyNeverLeft/
        cp -r assets NightSchool_TheyNeverLeft/
        cp BRADHITC.TTF NightSchool_TheyNeverLeft/
        zip -r NightSchool_TheyNeverLeft-Linux.zip NightSchool_TheyNeverLeft/
    - name: Attach to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: NightSchool_TheyNeverLeft-Linux.zip
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
