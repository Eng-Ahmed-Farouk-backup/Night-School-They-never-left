name: Build Night School EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame keyboard termcolor
    
    - name: Build executable with PyInstaller
      shell: cmd
      run: |
        pyinstaller --onefile --windowed --name "NightSchool_TheyNeverLeft" --icon="assets/icon.ico" --add-data "assets;assets" --hidden-import=keyboard --hidden-import=termcolor --collect-all pygame main.py
    
    - name: Create distribution folder
      shell: cmd
      run: |
        mkdir NightSchool_TheyNeverLeft
        copy dist\NightSchool_TheyNeverLeft.exe NightSchool_TheyNeverLeft\
        xcopy assets NightSchool_TheyNeverLeft\assets\ /E /I /Y
        copy *.py NightSchool_TheyNeverLeft\
    
    - name: Create ZIP
      shell: cmd
      run: |
        powershell Compress-Archive -Path NightSchool_TheyNeverLeft -DestinationPath NightSchool_TheyNeverLeft-Windows.zip -Force
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: NightSchool_TheyNeverLeft-Windows.zip
        name: "Night School: They Never Left - ${{ github.ref_name }}"
        body: |
          # Night School: They Never Left
          
          ## A Visual Novel by Ahmed Farouk
          
          ### Download & Play:
          1. Download `NightSchool_TheyNeverLeft-Windows.zip`
          2. Extract the ZIP file anywhere
          3. Run `NightSchool_TheyNeverLeft.exe`
          
          ### System Requirements:
          - Windows 10 or later
          - No installation required!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
